[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

# Proxy webcam requests to the serverless function
[[redirects]]
  from = "/api/webcam/:id"
  to = "/.netlify/functions/webcam-proxy?cam=:id"
  status = 200

# Proxy push alert requests to the serverless function
[[redirects]]
  from = "/api/send-push-alert"
  to = "/.netlify/functions/send-push-alert"
  status = 200


# React Router routing support - redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Content-Security-Policy = "frame-ancestors 'none';"

# Cache static assets for a long time
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Do not cache the Service Worker so updates are picked up immediately
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[functions."auto-evaluate"]
  schedule = "5 1 * * *"

